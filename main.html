<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset= "UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sorted Bands</title>
  <style>
      body {
		   font-family: Arial, sans-serif;
		  padding: 20px;
	  }

	  ul {
		  list-style-type: none;
		  padding: 0;
	  }

	  li {
		  padding: 8px;
		  border-bottom: 1px solid #ccc;
	  }
  </style>
</head>
<body>

	<h2>sorted Articles</h2>
	
	<u1 id="band"></u1>

	<script>
		const bands = [
			'The plot in You',
			'The Devil Wears prada',
			'pierce the Veli''
			'Norma Jean',
			'The Blead',
			'Say Anything',
			'The Midway State',
			'We Came as Romans',
			'Counterparts',
			'Oh, Sleeper',
			'Oh, Sleeper',
			'A Skylit Drive',
			'Anywhere But Here',
			'An Old Dog',
		  ];

		  function strip(bandName) {
			  return bandName.replace(/^(a |an |the )/i, '').trim();
			 }

		     const sortedBands = bands.sort((a, b) => {
                 if(strip(a) > strip(b)) {
					  return 1;
				 } else {
					 return -1;
				 }
				
			 });

		      document.getElementById("band").innerHTML =
				  sortedBands.map(band => `<li>${band}</li>`).join('');
	         </script>

           </body>
           </html>
