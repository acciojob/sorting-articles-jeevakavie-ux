<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset= "UTF-8">
  <title>Sorted Bands</title>

</head>
<body>

	<h2>Band List</h2>
	<u1 id="band"></u1>

	<script>
		const bands = [
			'The plot in You',
			'The Devil Wears prada',
			'pierce the Veli''
			'Norma Jean',
			'The Blead',
			'Say Anything',
			'The Midway State',
			'We Came as Romans',
			'Counterparts',
			'Oh, Sleeper',
			'Oh, Sleeper',
			'A Skylit Drive',
			'Anywhere But Here',
			'An Old Dog',
		  ];

		  function strip(bandName) {
			  return bandName.replace(/^(a |an |the )/i, '').trim();
			 }

		     const sortedBands = bands.sort((a, b) => {
                const bandA = strip(a);
				const bandB = strip(b);

				 if (bandA > bandB) return 1;
				 if (bandA < bandB) return -1;
				 return 0;
			 
			 });

		     const bandlist = document.getElementById('band');

		     bandlist.innerHTML = sortedBands
		        .map(band => `<li>${band}</li>`)
		         .join('');
	         </script>

           </body>
           </html>

		
		]
	</script>
